# Combustion rate constant (ECMWF Tech Memo 596).
Alpha: 1.37e-6
# enhancement factors for species contributing to AOD
enhance_aerosol_factor:
    tropical_forest: 1
    extratropical_forest: 1
    savanna: 1
    grassland: 1
# enhancement factors for non-aerosol species
enhance_gas_factor:
    tropical_forest: 1
    extratropical_forest: 1
    savanna: 1
    grassland: 1
# satellite scale factor based on comparison with GFED CO, since VIIRS 
# FRP density is scale to the AQUA level, the satellite factor should be 
# the same as AQUA
satscale:
    myd: 1
    mod: 1
    vj2: 0.7680
    vj1: 0.7680
    vnp: 0.7680
# MODIS C6 to C5 scaling factor (based on OC tuning), the VIIRS is 
# based on FRP density regression using MODIS AQUA (C6)as reference
# and with the MODIS C6 to C5 scaling factor considered
myd:
    tropical_forest: 1
    extratropical_forest: 1
    savanna: 1
    grassland: 1
mod:
    tropical_forest: 1
    extratropical_forest: 1
    savanna: 1
    grassland: 1
vj2:
    tropical_forest: 0.907912
    extratropical_forest: 0.907894
    savanna: 0.888717
    grassland: 0.886121
vj1:
    tropical_forest: 1
    extratropical_forest: 1
    savanna: 1
    grassland: 1
vnp:
    tropical_forest: 1.001681
    extratropical_forest: 1.025322
    savanna: 1.011056
    grassland: 1.018419
